name: Deploy to GitHub Pages

# Publishes the game by mirroring main onto the gh-pages branch, which
# GitHub Pages serves. The workflow token is allowed to push branches but
# NOT to flip the Pages admin switch, which is why the previous version of
# this workflow (actions/configure-pages with enablement) failed on every
# run. The site itself was first enabled by creating the gh-pages branch.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# One publish at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Mirror main to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push --force origin HEAD:gh-pages
